<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood TV Mode</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: sans-serif;
    user-select: none;
}

html, body {
    height: 100%;
    overflow: hidden;
    background: #f0fdf4;
}

/* AUTO SCALE UNTUK TV */
#app {
    width: 100vw;
    height: 100vh;
    transform-origin: top center;
}

/* HEADER */
.header {
    text-align: center;
    padding: 10px;
}

.title {
    font-size: 2rem;
    color: #166534;
    font-weight: bold;
}

.greeting {
    font-size: 2.5rem;
    font-weight: bold;
}

.subtitle {
    font-size: 1.2rem;
    color: #555;
}

/* RECAP */
.recap {
    position: absolute;
    top: 10px;
    right: 10px;
    background: white;
    padding: 10px 15px;
    border-radius: 10px;
    font-size: 1rem;
}

/* EMOJI AREA */
.emoji-area {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 60%;
    flex-wrap: wrap;
}

.emoji-btn {
    font-size: 5rem;
    border: none;
    background: none;
    cursor: pointer;
}

.label {
    display: block;
    font-size: 1rem;
}

/* TOAST */
.toast {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: #166534;
    color: white;
    padding: 20px 40px;
    font-size: 2rem;
    border-radius: 20px;
    transition: 0.3s;
}

.toast.show {
    transform: translate(-50%, -50%) scale(1);
}
</style>
</head>

<body>

<div id="app">

<div class="recap">
    Total: <span id="total">0</span><br>
    😄 <span id="senang">0</span> |
    🙂 <span id="biasa">0</span> |
    🥺 <span id="sedih">0</span>
</div>

<div class="header">
    <div class="title">SIT AR-RAHMAH</div>
    <div class="greeting">Selamat Datang ✨</div>
    <div class="subtitle">Bagaimana perasaanmu hari ini?</div>
</div>

<div class="emoji-area">
    <button class="emoji-btn" onclick="klik('senang')">
        😄<span class="label">Senang</span>
    </button>
    <button class="emoji-btn" onclick="klik('biasa')">
        🙂<span class="label">Biasa</span>
    </button>
    <button class="emoji-btn" onclick="klik('sedih')">
        🥺<span class="label">Ngantuk</span>
    </button>
</div>

<div class="toast" id="toast">Terima Kasih!</div>

</div>

<script>
// =====================
// AUTO SCALE TV
// =====================
function autoScale() {
    const baseWidth = 1920;
    const baseHeight = 1080;

    const scaleX = window.innerWidth / baseWidth;
    const scaleY = window.innerHeight / baseHeight;

    const scale = Math.min(scaleX, scaleY);

    document.getElementById("app").style.transform = `scale(${scale})`;
}
window.addEventListener("resize", autoScale);
autoScale();


// =====================
// DATA (LOCAL STORAGE)
// =====================
let total = 0;
let mood = { senang:0, biasa:0, sedih:0 };

const saved = localStorage.getItem("moodTV");
if(saved){
    const data = JSON.parse(saved);
    total = data.total;
    mood = data.mood;
}

// update UI awal
updateUI();

function updateUI(){
    document.getElementById("total").innerText = total;
    document.getElementById("senang").innerText = mood.senang;
    document.getElementById("biasa").innerText = mood.biasa;
    document.getElementById("sedih").innerText = mood.sedih;
}

// =====================
// KLIK EMOJI
// =====================
function klik(jenis){

    total++;
    mood[jenis]++;

    updateUI();

    // simpan
    localStorage.setItem("moodTV", JSON.stringify({
        total: total,
        mood: mood
    }));

    // confetti
    confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.7 }
    });

    // toast
    const t = document.getElementById("toast");
    t.classList.add("show");
    setTimeout(()=> t.classList.remove("show"), 1000);
}


// =====================
// FULLSCREEN AUTO (TERGANTUNG TV)
// =====================
document.body.addEventListener("click", ()=>{
    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }
}, { once:true });

</script>

</body>
</html>
