<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Monitoring</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
}

body {
    background: linear-gradient(to bottom, #f0fdf4, #dcfce7);
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    text-align: center;
    padding: 20px 10px;
}

.title {
    font-size: 2rem;
    font-weight: bold;
    color: #166534;
}

.greeting {
    font-size: 3rem;
    font-weight: 800;
}

.subtitle {
    font-size: 1.5rem;
    color: #555;
}

/* RECAP */
.recap {
    position: absolute;
    top: 15px;
    right: 20px;
    background: white;
    padding: 12px 18px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    font-size: 1.1rem;
}

/* EMOJI AREA */
.emoji-area {
    flex: 1;
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    padding: 20px;
}

.emoji-btn {
    font-size: 8rem;
    border: none;
    background: none;
    cursor: pointer;
    transition: transform 0.15s;
}

.emoji-btn:active {
    transform: scale(0.85);
}

.label {
    display: block;
    font-size: 1.5rem;
    margin-top: 10px;
    color: #374151;
    font-weight: bold;
}

/* TOAST */
.toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: #166534;
    color: white;
    padding: 20px 40px;
    font-size: 2rem;
    border-radius: 20px;
    transition: 0.3s;
    z-index: 100;
}

.toast.show {
    transform: translate(-50%, -50%) scale(1);
}

/* RESPONSIVE HP */
@media (max-width: 768px) {
    .emoji-area {
        flex-direction: column;
        gap: 20px;
    }

    .emoji-btn {
        font-size: 5rem;
    }

    .greeting {
        font-size: 2rem;
    }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="ting" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="senangSound" src="senang.wav"></audio>
<audio id="biasaSound" src="biasa.wav"></audio>
<audio id="sedihSound" src="sedih.wav"></audio>

<!-- RECAP -->
<div class="recap">
    Total: <span id="total">0</span><br>
    😄 <span id="senang">0</span> |
    🙂 <span id="biasa">0</span> |
    🥺 <span id="sedih">0</span>
</div>

<!-- HEADER -->
<div class="header">
    <div class="title">SIT AR-RAHMAH</div>
    <div class="greeting">Selamat Datang ✨</div>
    <div class="subtitle">Bagaimana perasaanmu hari ini?</div>
</div>

<!-- EMOJI -->
<div class="emoji-area">
    <button class="emoji-btn" onclick="klik('senang')">
        😄<span class="label">Senang</span>
    </button>
    <button class="emoji-btn" onclick="klik('biasa')">
        🙂<span class="label">Biasa</span>
    </button>
    <button class="emoji-btn" onclick="klik('sedih')">
        🥺<span class="label">Ngantuk</span>
    </button>
</div>

<!-- TOAST -->
<div class="toast" id="toast">Terima Kasih! 🎉</div>

<script>
// AUDIO
const ting = document.getElementById("ting");
const senangSound = document.getElementById("senangSound");
const biasaSound = document.getElementById("biasaSound");
const sedihSound = document.getElementById("sedihSound");

// DATA
let total = 0;
let mood = { senang:0, biasa:0, sedih:0 };

// LOAD DATA
const saved = localStorage.getItem("moodTV");
if(saved){
    const data = JSON.parse(saved);
    total = data.total;
    mood = data.mood;
}

updateUI();

function updateUI(){
    document.getElementById("total").innerText = total;
    document.getElementById("senang").innerText = mood.senang;
    document.getElementById("biasa").innerText = mood.biasa;
    document.getElementById("sedih").innerText = mood.sedih;
}

// KLIK
function klik(jenis){

    total++;
    mood[jenis]++;
    updateUI();

    // SIMPAN
    localStorage.setItem("moodTV", JSON.stringify({
        total: total,
        mood: mood
    }));

    // SOUND
    if (ting) {
        ting.currentTime = 0;
        ting.play().catch(()=>{});
    }

    setTimeout(() => {
        if (jenis === "senang") senangSound.play().catch(()=>{});
        if (jenis === "biasa") biasaSound.play().catch(()=>{});
        if (jenis === "sedih") sedihSound.play().catch(()=>{});
    }, 300);

    // CONFETTI
    confetti({
        particleCount: 120,
        spread: 80,
        origin: { y: 0.7 }
    });

    // TOAST
    const t = document.getElementById("toast");
    t.classList.add("show");
    setTimeout(()=> t.classList.remove("show"), 1000);
}

// FULLSCREEN (opsional TV)
document.body.addEventListener("click", ()=>{
    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }
}, { once:true });

</script>

</body>
</html>
